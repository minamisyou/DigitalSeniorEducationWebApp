<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시니어 키오스크 체험</title>
    <style>
        /* 기본 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 600px; height: 100vh; background: white; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* 상단 토글 바 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #333; color: white; z-index: 100; }
        .toggle-label { font-size: 16px; font-weight: bold; }
        
        /* 토글 스위치 UI */
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; } 
        input:checked + .slider:before { transform: translateX(26px); }

        /* 공통 컨테이너 */
        .screen { display: none; padding: 20px; flex-direction: column; flex-grow: 1; overflow-y: auto; position: relative; }
        .screen.active { display: flex; }
        
        /* [기본 상태: 도움 OFF] */
        .friendly-ui { display: none !important; }
        .unfriendly-ui { display: block !important; }

        .header { font-size: 14px; color: #999; text-align: left; padding: 0; margin-bottom: 10px; border: none; background: transparent; }
        .btn-grid { display: flex; gap: 5px; flex-direction: row; flex-wrap: wrap; justify-content: center; margin-top: 50px; }
        
        .action-btn, .option-btn, .pay-btn, .coupon-btn { 
            width: 80px; height: 80px; padding: 5px; font-size: 10px; background: #eee; border: 1px solid #ccc; border-radius: 0; color: #999; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; box-shadow: none; margin: 0;
        }

        /* [도움 ON 상태] 시니어 친화적 UI (.help-mode) */
        .help-mode .friendly-ui { display: flex !important; width: 100%; justify-content: space-between; align-items: center; }
        .help-mode .option-btn .friendly-ui, .help-mode .pay-btn .friendly-ui, .help-mode .coupon-btn .friendly-ui { justify-content: center; }
        .help-mode .unfriendly-ui { display: none !important; }

        .help-mode .header { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 30px; margin-top: 10px; padding: 20px; background: #fff3e0; color: #333; border-radius: 15px; }
        .help-mode .btn-grid { gap: 20px; flex-direction: column; margin-top: 0; flex-wrap: nowrap; }
        
        .help-mode .action-btn { width: 100%; height: auto; border: 3px solid #ddd; padding: 30px 20px; font-size: 24px; font-weight: bold; border-radius: 15px; background: white; color: #333; }
        .help-mode .option-btn { width: 100%; height: auto; background-color: #4CAF50; color: white; border: none; padding: 40px 20px; font-size: 32px; font-weight: bold; border-radius: 20px; }
        .help-mode .option-btn.alt { background-color: #2196F3; }
        .help-mode .pay-btn { width: 100%; height: auto; background-color: #ff9800; color: white; border: none; padding: 30px 20px; font-size: 26px; font-weight: bold; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .help-mode .pay-btn.alt { background-color: #673ab7; }
        
        .help-mode .coupon-btn { width: 100%; height: auto; background-color: #e91e63; color: white; border: none; padding: 20px; font-size: 22px; font-weight: bold; border-radius: 15px; margin-bottom: 20px; border: 3px dashed #f8bbd0; }

        /* 말풍선 공통 스타일 */
        .tooltip { 
            position: absolute; bottom: 85%; left: 50%; transform: translate(-50%, 0);
            background-color: #ffe082; color: #333; padding: 12px 18px; border-radius: 10px; font-size: 16px; font-weight: bold; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); border: 2px solid #ffca28;
            animation: floatUpDown 1.5s ease-in-out infinite; pointer-events: none; z-index: 10; width: max-content;
        }
        .tooltip::after { 
            content: ''; position: absolute; top: 100%; left: 50%; margin-left: -10px;
            border-width: 10px; border-style: solid; border-color: #ffca28 transparent transparent transparent; 
        }
        @keyframes floatUpDown {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -8px); }
        }

        /* 카메라 스캔 화면 */
        #step-camera { padding: 0; background: #000; justify-content: center; align-items: center; }
        #camera-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .scan-overlay { position: absolute; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); pointer-events: none; }
        .scan-guide-box { width: 250px; height: 150px; border: 4px solid #4CAF50; border-radius: 15px; position: relative; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); background: transparent; }
        .scan-line { width: 100%; height: 2px; background: red; position: absolute; top: 50%; box-shadow: 0 0 10px red; animation: scanAnim 2s infinite linear; }
        @keyframes scanAnim { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
        .scan-text { color: white; font-size: 24px; font-weight: bold; margin-top: 30px; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .touch-to-scan { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 50px; }
        .touch-btn-text { background: rgba(255,87,34,0.9); color: white; padding: 15px 30px; border-radius: 30px; font-size: 20px; font-weight: bold; pointer-events: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .cancel-camera-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.3); color: white; border: 2px solid white; padding: 10px 20px; border-radius: 10px; z-index: 11; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* 성공 화면 */
        #step-success { justify-content: center; align-items: center; text-align: center; background-color: #4CAF50; color: white; height: 100%; }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        .success-text { font-size: 32px; font-weight: bold; line-height: 1.5; }
        .restart-btn { margin-top: 40px; background: white; color: #4CAF50; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .coupon-applied-badge { display: none; background: #e91e63; color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 18px; animation: bounceIn 0.5s; }
        @keyframes bounceIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body id="app-body"> 

<div class="app-container">
    <div class="top-bar">
        <span class="toggle-label">💡 도움 모드 (큰 글씨 및 안내)</span>
        <label class="switch">
            <input type="checkbox" id="help-toggle" onchange="toggleMode()">
            <span class="slider round"></span>
        </label>
    </div>

    <div id="step-menu" class="screen active">
        <div class="header friendly-ui">어떤 음료를 드시겠어요?</div>
        <div class="header unfriendly-ui">Select your beverage. Add shots or syrups.</div>
        <div class="btn-grid">
            <button class="action-btn" onclick="nextStep('step-option')">
                <div class="friendly-ui">
                    <div class="tooltip">단맛이 없는 따뜻한 블랙커피예요</div>
                    <span>☕ 따뜻한 아메리카노</span>
                    <span>2,000원</span>
                </div>
                <div class="unfriendly-ui">HOT<br>Americano<br>2.0</div>
            </button>
            <button class="action-btn" onclick="nextStep('step-option')">
                <div class="friendly-ui">
                    <div class="tooltip" style="animation-delay: 0.2s;">얼음이 들어간 시원한 커피예요</div>
                    <span>🧊 시원한 아메리카노</span>
                    <span>2,000원</span>
                </div>
                <div class="unfriendly-ui">ICED<br>Americano<br>2.0</div>
            </button>
        </div>
    </div>

    <div id="step-option" class="screen">
        <div class="header friendly-ui">어디서 드시나요?</div>
        <div class="header unfriendly-ui">Select dining option.</div>
        <div class="btn-grid">
            <button class="option-btn" onclick="nextStep('step-payment')">
                <div class="friendly-ui">
                    <div class="tooltip">매장 안 의자에 앉아서 드실 때 눌러주세요</div>
                    <span>🍽️ 매장에서 먹고 가기</span>
                </div>
                <div class="unfriendly-ui">Dine-in</div>
            </button>
            <button class="option-btn alt" onclick="nextStep('step-payment')">
                <div class="friendly-ui">
                    <div class="tooltip" style="animation-delay: 0.3s;">들고 나가서 드실 때 눌러주세요</div>
                    <span>🛍️ 포장해서 가져가기</span>
                </div>
                <div class="unfriendly-ui">To-go</div>
            </button>
        </div>
    </div>

    <div id="step-payment" class="screen">
        <div class="header friendly-ui">결제 방식을 선택해 주세요.</div>
        <div class="header unfriendly-ui">Checkout & Payment.</div>
        
        <div id="coupon-badge" class="coupon-applied-badge">🎉 500원 할인 쿠폰이 적용되었습니다!</div>

        <div class="btn-grid">
            <button class="coupon-btn" onclick="openCamera()">
                <div class="friendly-ui">
                    <div class="tooltip">할인 쿠폰이 있다면 여기를 먼저 눌러주세요</div>
                    <span>🎫 할인 쿠폰 바코드 스캔하기</span>
                </div>
                <div class="unfriendly-ui">Promo/Barcode</div>
            </button>

            <button class="pay-btn" onclick="nextStep('step-success')">
                <div class="friendly-ui">
                    <div class="tooltip">실물 카드를 기기에 꽂아서 결제해요</div>
                    <span>💳 신용카드 / 체크카드</span>
                </div>
                <div class="unfriendly-ui">Credit Card</div>
            </button>
            <button class="pay-btn alt" onclick="nextStep('step-success')">
                <div class="friendly-ui">
                    <div class="tooltip" style="animation-delay: 0.3s;">휴대폰을 기기에 대서 결제해요</div>
                    <span>📱 모바일 결제 (삼성페이)</span>
                </div>
                <div class="unfriendly-ui">Easy Pay</div>
            </button>
        </div>
    </div>

    <div id="step-camera" class="screen">
        <video id="camera-video" autoplay playsinline></video>
        <button class="cancel-camera-btn" onclick="closeCamera(false)">돌아가기</button>
        <div class="scan-overlay">
            <div class="scan-guide-box"><div class="scan-line"></div></div>
            <div class="scan-text friendly-ui">초록색 네모 칸 안에<br>바코드를 비춰주세요</div>
            <div class="scan-text unfriendly-ui" style="font-size: 14px; color: #ccc;">Align barcode. Auto-scan only.</div>
        </div>
        <div class="touch-to-scan" onclick="closeCamera(true)">
            <div class="touch-btn-text friendly-ui">여기를 터치하면 스캔이 완료됩니다</div>
        </div>
    </div>

    <div id="step-success" class="screen">
        <div class="success-icon">🎉</div>
        <div class="success-text">결제 완료!<br>참 잘하셨습니다!</div>
        <button class="restart-btn" onclick="restart()">처음으로 돌아가기</button>
    </div>
</div>

<script>
    let cameraStream = null;

    function toggleMode() {
        const body = document.getElementById('app-body');
        const toggle = document.getElementById('help-toggle');
        if (toggle.checked) body.classList.add('help-mode'); 
        else body.classList.remove('help-mode'); 
    }

    function nextStep(stepId) {
        document.querySelectorAll('.screen').forEach(screen => {
            screen.classList.remove('active');
        });
        document.getElementById(stepId).classList.add('active');
    }

    async function openCamera() {
        nextStep('step-camera');
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const videoElement = document.getElementById('camera-video');
            videoElement.srcObject = cameraStream;
        } catch (error) {
            console.error("카메라 에러:", error);
            alert("카메라를 사용할 수 없어 시뮬레이션 모드로 전환합니다.");
            closeCamera(true);
        }
    }

    function closeCamera(isSuccess) {
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
        }
        if (isSuccess) {
            document.getElementById('coupon-badge').style.display = 'block';
            nextStep('step-payment');
        } else {
            nextStep('step-payment');
        }
    }

    function restart() {
        document.getElementById('coupon-badge').style.display = 'none';
        nextStep('step-menu');
    }
</script>

</body>
</html>
