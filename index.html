<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시니어 키오스크 체험</title>
    <style>
        /* 기본 설정 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 600px; height: 100vh; background: white; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        /* 1단계: 시력 테스트 (불친절한 UI) */
        #step1-unfriendly { padding: 40px 20px; text-align: center; height: 100%; position: relative; }
        .tiny-text { font-size: 11px; color: #b0b0b0; line-height: 1.8; margin-top: 50px; }
        .fake-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .fake-item { width: 60px; height: 60px; background: #eee; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #ccc; }
        
        /* 구석에 있는 시니어 전용 버튼 */
        .senior-btn { position: absolute; bottom: 30px; right: 20px; background-color: #ff5722; color: white; border: none; padding: 15px 20px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.2s; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* 2단계: 시니어 친화적 키오스크 */
        #step2-kiosk { display: none; padding: 20px; height: 100%; flex-direction: column; }
        .header { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 20px; color: #333; padding: 20px; background: #fff3e0; border-radius: 15px; }
        .menu-grid { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; }
        .menu-btn { background-color: #ffffff; border: 3px solid #ddd; padding: 30px 20px; font-size: 24px; font-weight: bold; border-radius: 15px; cursor: pointer; transition: 0.2s; text-align: left; display: flex; justify-content: space-between; align-items: center; color: #333; }
        .menu-btn:active { background-color: #ffe0b2; border-color: #ff9800; }
        
        /* 3단계: 옵션 선택 (매장/포장) */
        #step3-option { display: none; padding: 20px; height: 100%; flex-direction: column; justify-content: center; gap: 20px; }
        .option-btn { background-color: #4CAF50; color: white; border: none; padding: 40px 20px; font-size: 32px; font-weight: bold; border-radius: 20px; cursor: pointer; text-align: center; }
        .option-btn.takeout { background-color: #2196F3; }

        /* 4단계: 결제수단 선택 */
        #step4-payment { display: none; padding: 20px; height: 100%; flex-direction: column; justify-content: center; gap: 20px; }
        .payment-btn { background-color: #ff9800; color: white; border: none; padding: 40px 20px; font-size: 28px; font-weight: bold; border-radius: 20px; cursor: pointer; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .payment-btn.mobile-pay { background-color: #673ab7; }

        /* 5단계: 성공 화면 */
        #step5-success { display: none; padding: 20px; height: 100%; flex-direction: column; justify-content: center; align-items: center; text-align: center; background-color: #4CAF50; color: white; }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        .success-text { font-size: 32px; font-weight: bold; line-height: 1.5; }
        .restart-btn { margin-top: 40px; background: white; color: #4CAF50; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="step1-unfriendly">
        <h2 style="font-size: 14px; color: #888;">Modern Cafe Order System</h2>
        <div class="tiny-text">
            고객님 환영합니다. 원하시는 메뉴를 선택하신 후 결제를 진행해 주시기 바랍니다.<br>
            포인트 적립 및 할인은 결제 전 화면에서 적용 가능합니다.<br>
            알러지 유발 물질이 포함되어 있을 수 있으니 직원에게 문의 바랍니다.
        </div>
        <div class="fake-menu">
            <div class="fake-item">Espresso</div>
            <div class="fake-item">Americano</div>
            <div class="fake-item">Latte</div>
            <div class="fake-item">Frappuccino</div>
            <div class="fake-item">Cold Brew</div>
            <div class="fake-item">Tea</div>
        </div>
        <button class="senior-btn" onclick="showScreen('step2-kiosk')">🔍 큰 글씨 돋보기 모드</button>
    </div>

    <div id="step2-kiosk">
        <div class="header">어떤 음료를 드시겠어요?</div>
        <div class="menu-grid">
            <button class="menu-btn" onclick="showScreen('step3-option')">
                <span>☕ 따뜻한 아메리카노</span>
                <span>2,000원</span>
            </button>
            <button class="menu-btn" onclick="showScreen('step3-option')">
                <span>🧊 시원한 아메리카노</span>
                <span>2,000원</span>
            </button>
            <button class="menu-btn" onclick="showScreen('step3-option')">
                <span>🥛 부드러운 카페라떼</span>
                <span>3,000원</span>
            </button>
        </div>
    </div>

    <div id="step3-option">
        <div class="header">어디서 드시나요?</div>
        <button class="option-btn" onclick="showScreen('step4-payment')">🍽️ 매장에서 먹고 가기</button>
        <button class="option-btn takeout" onclick="showScreen('step4-payment')">🛍️ 포장해서 가져가기</button>
    </div>

    <div id="step4-payment">
        <div class="header">어떻게 결제하시겠어요?</div>
        <button class="payment-btn" onclick="showScreen('step5-success')">💳 신용카드 / 체크카드</button>
        <button class="payment-btn mobile-pay" onclick="showScreen('step5-success')">📱 모바일 결제 (삼성페이 등)</button>
    </div>

    <div id="step5-success">
        <div class="success-icon">🎉</div>
        <div class="success-text">결제 완료!<br>참 잘하셨습니다!</div>
        <button class="restart-btn" onclick="showScreen('step1-unfriendly')">처음으로 돌아가기</button>
    </div>
</div>

<script>
    function showScreen(screenId) {
        // 모든 화면 숨기기
        document.getElementById('step1-unfriendly').style.display = 'none';
        document.getElementById('step2-kiosk').style.display = 'none';
        document.getElementById('step3-option').style.display = 'none';
        document.getElementById('step4-payment').style.display = 'none';
        document.getElementById('step5-success').style.display = 'none';
        
        // 선택한 화면만 보이기 (1단계는 block, 나머지는 flex 사용)
        if(screenId === 'step1-unfriendly') {
            document.getElementById(screenId).style.display = 'block';
        } else {
            document.getElementById(screenId).style.display = 'flex';
        }
    }
</script>

</body>
</html>
